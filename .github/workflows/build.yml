name: Build YAML Assistant Plugin

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Plugin
        run: ./gradlew buildPlugin
        working-directory: yaml-assistant

      - name: Run Tests
        run: ./gradlew test
        working-directory: yaml-assistant

      - name: Upload Plugin Artifact
        uses: actions/upload-artifact@v4
        with:
          name: yaml-assistant-plugin
          path: yaml-assistant/build/distributions/*.zip
